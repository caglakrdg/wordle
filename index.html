    <title>wordle</title>

  <body>
    <nav>
      <a href="index.html">Word of the Day</a>

    <div class="content-wrapper">
      <h1>Word of the Day</h1>
      <div id="word-of-the-day">
        <div class="loading-indicator">
          <div
            class="loading-icon"
            style="
              font-variation-settings:
                &quot;FILL&quot; 1,
                &quot;wght&quot; 700,
                &quot;GRAD&quot; 0,
                &quot;opsz&quot; 48;
            "
          >
            <span class="material-symbols-outlined">progress_activity</span>
          </div>
          <p id="word">Loading...</p>
        </div>
        <div class="wordle-form">
          <div class="word-by-letter">
            <input
              id="1-1"
              type="text"
              regex="[A-Za-z]"
              maxlength="1"
              class="letter-input"
              oninput="moveToNext(this, '1-2')"
              onkeydown="moveBackward(this, event)"
            />
            <input
              id="1-2"
              type="text"
              maxlength="1"
              class="letter-input"
              oninput="moveToNext(this, '1-3')"
              onkeydown="moveBackward(this, event)"
            />
            <input
              id="1-3"
              type="text"
              maxlength="1"
              class="letter-input"
              oninput="moveToNext(this, '1-4')"
              onkeydown="moveBackward(this, event)"
            />
            <input
              id="1-4"
              type="text"
              maxlength="1"
              class="letter-input"
              oninput="moveToNext(this, '1-5')"
              onkeydown="moveBackward(this, event)"
            />
            <input
              id="1-5"
              type="text"
              maxlength="1"
              class="letter-input"
              oninput="submitGuess(1)"
            />
          </div>
          <div class="word-by-letter">
